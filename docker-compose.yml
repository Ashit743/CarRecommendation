services:
  postgres:
    image: postgres:17-alpine
    container_name: car-app-postgres
    environment:
      POSTGRES_DB: car_app
      POSTGRES_USER: car_app
      POSTGRES_PASSWORD: car_app
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U car_app -d car_app"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
